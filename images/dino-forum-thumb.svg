<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c7d2fe"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#000" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <!-- Forum window card -->
  <g transform="translate(640 360)" filter="url(#shadow)">
    <rect x="-260" y="-170" width="520" height="340" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
    <rect x="-260" y="-170" width="520" height="44" rx="18" ry="18" fill="#312e81"/>
    <circle cx="-236" cy="-148" r="8" fill="#fca5a5"/>
    <circle cx="-214" cy="-148" r="8" fill="#fde68a"/>
    <circle cx="-192" cy="-148" r="8" fill="#86efac"/>
    <!-- left nav -->
    <rect x="-240" y="-110" width="120" height="240" rx="10" fill="#f3f4f6"/>
    <rect x="-230" y="-100" width="100" height="16" rx="6" fill="#c7d2fe"/>
    <rect x="-230" y="-75" width="90" height="12" rx="6" fill="#d1d5db"/>
    <rect x="-230" y="-55" width="70" height="12" rx="6" fill="#d1d5db"/>
    <rect x="-230" y="-35" width="80" height="12" rx="6" fill="#d1d5db"/>
    <!-- thread list -->
    <g transform="translate(-100,-110)">
      <rect x="0" y="0" width="330" height="56" rx="10" fill="#eef2ff"/>
      <rect x="14" y="12" width="210" height="12" rx="6" fill="#3730a3"/>
      <rect x="14" y="32" width="180" height="10" rx="5" fill="#a5b4fc"/>
      <rect x="0" y="70" width="330" height="56" rx="10" fill="#fff7ed"/>
      <rect x="14" y="82" width="200" height="12" rx="6" fill="#9a3412"/>
      <rect x="14" y="102" width="160" height="10" rx="5" fill="#fdba74"/>
      <rect x="0" y="140" width="330" height="56" rx="10" fill="#ecfeff"/>
      <rect x="14" y="152" width="220" height="12" rx="6" fill="#155e75"/>
      <rect x="14" y="172" width="150" height="10" rx="5" fill="#67e8f9"/>
    </g>
  </g>
  <!-- tiny dino silhouette for flavor -->
  <g transform="translate(1040 560) scale(1.2)">
    <rect x="0" y="-20" width="14" height="16" fill="#1f2937"/>
    <rect x="10" y="-28" width="22" height="24" fill="#1f2937"/>
    <rect x="32" y="-24" width="10" height="10" fill="#1f2937"/>
    <rect x="8" y="-4" width="10" height="18" fill="#1f2937"/>
    <rect x="18" y="-4" width="10" height="18" fill="#1f2937"/>
    <rect x="22" y="-12" width="16" height="8" fill="#1f2937"/>
  </g>
  <text x="640" y="650" font-family="'Poppins','Prompt',system-ui" font-size="44" text-anchor="middle" fill="#1f2937" opacity="0.9">Dino Forum</text>
</svg>